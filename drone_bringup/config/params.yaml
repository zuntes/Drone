# ── drone identity ────────────────────────────────────────────────────────────
# Used by mqtt_bridge_node only. telemetry_node is identity-agnostic.
mqtt_bridge_node:
  ros__parameters:
    tenant_id:    "Hanoi"
    drone_id:     "drone_01"
    drone_serial: "SN000001"
    # EMQX broker — fill in your cluster host/port from the EMQX dashboard
    # Cloud/serverless: typically port 8883 with TLS
    # Self-hosted:      typically port 1883 (plain) or 8883 (TLS)
    mqtt_host:    "https://dev-lae-mqtt.viettelpost.vn"
    mqtt_port:    8883
    mqtt_username: "dungpt64"
    mqtt_password: "v12345678"
    mqtt_tls:     true

# ── publish rates ─────────────────────────────────────────────────────────────
# Controlled by telemetry_node only. mqtt_bridge forwards whatever it receives.
telemetry_node:
  ros__parameters:
    telemetry_rate_hz: 5.0    # /mqtt_bridge/out/telemetry
    status_rate_hz:    1.0    # /mqtt_bridge/out/status
    alarm_rate_hz:     0.2    # periodic floor (5s); changes publish immediately
